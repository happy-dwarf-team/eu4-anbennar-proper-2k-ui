 CANNOR_DESC:0 "Cannor                                                                                                                                                                     ÂŁicon_new_playerÂŁ Â§GRecommended for players who are new to the setting.Â§! \n\nÂŁbookmark_race_humanÂŁÂŁbookmark_race_elvenÂŁÂŁbookmark_race_halflingÂŁÂŁbookmark_race_dwarvenÂŁÂŁbookmark_race_gnomishÂŁÂŁbookmark_race_koboldÂŁÂŁbookmark_race_trollÂŁÂŁbookmark_race_gnollishÂŁ\n    ÂŁbookmark_separatorÂŁ\nA year has passed since the end of the Lilac Wars, a dynastic war of succession between the imperial Grand Duchy of Dameria and its neighbour, the Kingdom of Lorent. Lorent stands tired yet victorious, due to the betrayal of their Damerian enemies by their imperial allies like the Grand Duke of Wex, whom now holds the imperial seat. The balance of power is broken and new challenges will arise, but will the dream of Anbennar (unity) finally be achieved or will Cannor once again descend into chaos?"
 ESCANN_DESC:0 "Escann                                                                                                                                                                     ÂŁicon_veteranÂŁ Â§YRecommended for EU4 veterans who are looking for something unique.Â§!\n\nÂŁbookmark_race_humanÂŁÂŁbookmark_race_orcishÂŁÂŁbookmark_race_goblinÂŁÂŁbookmark_race_elvenÂŁÂŁbookmark_race_dwarvenÂŁÂŁbookmark_race_halflingÂŁ\n    ÂŁbookmark_separatorÂŁ\nFor 20 years, the orc clans ravaged the land of Escann, destroying the chivalric kingdoms that succeeded old Castanor, the greatest human empire. Now with the death of Korgus, the orc chieftain, a new era has begun, with adventurers from all of Cannor roaming Escann in search of wealth, fame, and adventure, inspired by Corin, the adventurer-turned goddess that defeated the orcish warlord. Will the kingdoms of old arise once more, or will the lands of Castanor become the birthplace of new kingdoms, both human and orc?"
 DWAROVAR_DESC:0 "The Serpentspine                                                                                                                                                     ÂŁicon_veteranÂŁ Â§YRecommended for EU4 veterans who are looking for something unique.Â§!\n\nÂŁbookmark_race_dwarvenÂŁÂŁbookmark_race_goblinÂŁÂŁbookmark_race_orcishÂŁÂŁbookmark_race_koboldÂŁÂŁbookmark_race_ogreÂŁ\n    ÂŁbookmark_separatorÂŁ\nThe Greentide was a disaster for Escann, but for the dwarves and goblins of the Western Serpentspine it presented a unique opportunity. With so many orcs leaving for the surface, a power vacuum has been created in the Dwarovar. Goblins cast off the shackles of their former orcish slave masters, and dwarves from both surface and remnant holds seek to reclaim what they lost long ago. In the east, goblins carve out their domains in the Tree of Stone, in the shadow of the powerful hobgoblin Command."
